---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vagina-server
  namespace: vagina-server
  labels:
    environment: production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  tls:
    - hosts:
        - "api.vagina.app"
      secretName: service-tls
  rules:
    - host: api.vagina.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
