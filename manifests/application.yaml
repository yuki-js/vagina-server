# Kubernetes Production Configuration
#
# This file contains overridden values against server/src/main/resources/application.yaml.
# Put only non-secret production-specific overrides here.
# If a production value is not decided yet, keep it as FIXME until the deployment value is fixed.
# Secret values belong in application-secret.yaml created from application-secret-template.yaml.

quarkus:
  datasource:
    jdbc:
      url: jdbc:postgresql://pg-cluster-rw.pg-cluster.svc.cluster.local:5432/vagina-server-db

  log:
    level: INFO
    category:
      "app.vagina.server":
        level: INFO
    console:
      json:
        enabled: true
        pretty-print: false
        additional-field:
          "service.name":
            value: vagina-server
          "service.version":
            value: 0.0.1
  http:
    cors:
      origins: https://vagina.app,/^https://(.*\.)?vagina-bo6.pages.dev/

mp:
  jwt:
    verify:
      publickey:
        location: /keys/publicKey.pem # provided via key generator initContainer
        algorithm: ES256
      issuer: https://vagina-api.ouchiserver.aokiapp.com

smallrye:
  jwt:
    sign:
      key:
        location: /keys-src/privateKey.pem # provided by dedicated key secret
    new-token:
      issuer: https://vagina-api.ouchiserver.aokiapp.com

vagina:
  openai-base: https://vagina-prod.services.ai.azure.com/openai/v1
  auth:
    oidc:
      providers:
        google:
          display-name: Google
          configuration-url: https://accounts.google.com/.well-known/openid-configuration
          client-id: "704305705393-v10tqd74ldua1j18km3id7dom3ipk73i.apps.googleusercontent.com"
        github:
          display-name: GitHub
          configuration-url: https://github.com/login/oauth/.well-known/openid-configuration
          client-id: Ov23li65vfwKe2OOj9Xs

      redirect-uri:
        web: https://vagina.app/callback
        mobile: https://vagina.app/callback
        desktop: https://vagina.app/callback

  realtime:
    default-model: realtime-2.1-mini
    models:
      realtime-2.1-mini:
        provider: oai
        display-name: Realtime 2.1 mini
        base-url: "${vagina.openai-base}"
        transcription-model: gpt-4o-mini-transcribe
        api-key: ${vagina.openai-default-apikey}
        model: gpt-realtime-2.1-mini
        reasoning-effort: none
      realtime-2.1:
        provider: oai
        display-name: Realtime 2.1 (Reasoning Off)
        base-url: "${vagina.openai-base}"
        transcription-model: gpt-4o-transcribe
        api-key: ${vagina.openai-default-apikey}
        model: gpt-realtime-2.1
        reasoning-effort: none
      realtime-2.1-high:
        provider: oai
        display-name: Realtime 2.1 (Reasoning High)
        base-url: "${vagina.openai-base}"
        transcription-model: gpt-4o-transcribe
        api-key: ${vagina.openai-default-apikey}
        model: gpt-realtime-2.1
        reasoning-effort: high
      realtime-1.5:
        provider: oai
        display-name: Realtime 1.5
        base-url: "${vagina.openai-base}"
        transcription-model: gpt-4o-transcribe
        api-key: ${vagina.openai-default-apikey}
        model: gpt-realtime-1.5
      audio-1.5:
        provider: oai_cc
        display-name: Audio 1.5
        base-url: "${vagina.openai-base}"
        api-key: ${vagina.openai-default-apikey}
        model: gpt-audio-1.5
      placeholder-paid:
        provider: oai_cc
        display-name: Coming Soon... (有料アーリーアクセス)
        base-url: "${vagina.openai-base}"
        api-key: ${vagina.openai-default-apikey}
        required-entitlement: placeholder-paid
        model: gpt-audio-1.5

  text-agent:
    default-model: gpt-5.5
    models:
      gpt-5.5:
        provider: oai_responses
        display-name: GPT-5.5 Instant
        base-url: "${vagina.openai-base}"
        api-key: ${vagina.openai-default-apikey}
        model: gpt-5.5
        # Optional schema-wide values: none, minimal, low, medium, high, xhigh, max.
        # Responses serializes this as reasoning.effort; oai_chat uses reasoning_effort.
        # reasoning-effort: high
        # Optional Responses-only execution mode: standard or pro.
        # reasoning-mode: standard
      gpt-5.6-sol-pro-max:
        provider: oai_responses
        display-name: GPT-5.6 Sol Pro Max
        base-url: "${vagina.openai-base}"
        api-key: ${vagina.openai-default-apikey}
        model: gpt-5.6-sol
        reasoning-effort: max
        reasoning-mode: pro
      gpt-5.6-sol-xhigh:
        provider: oai_responses
        display-name: GPT-5.6 Sol Extra High
        base-url: "${vagina.openai-base}"
        api-key: ${vagina.openai-default-apikey}
        model: gpt-5.6-sol
        reasoning-effort: xhigh
        reasoning-mode: standard
      gpt-5.6-sol-high:
        provider: oai_responses
        display-name: GPT-5.6 Sol High
        base-url: "${vagina.openai-base}"
        api-key: ${vagina.openai-default-apikey}
        model: gpt-5.6-sol
        reasoning-effort: high
        reasoning-mode: standard
      gpt-5.6-sol-low:
        provider: oai_responses
        display-name: GPT-5.6 Sol Low
        base-url: "${vagina.openai-base}"
        api-key: ${vagina.openai-default-apikey}
        model: gpt-5.6-sol
        reasoning-effort: low
        reasoning-mode: standard
      aok:
        provider: oai_responses
        display-name: Aok (Hermes Agent)
        base-url: http://10.1.0.10:8642/v1
        model: aok
        required-entitlement: aok-owner
        is-stealth: true

  object-storage:
    endpoint: https://9cacada6061eed702d20f32c61fe7755.r2.cloudflarestorage.com
    bucket: vagina
    region: auto
    path-prefix: ""
