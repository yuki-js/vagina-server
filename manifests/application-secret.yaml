---
apiVersion: v1
kind: Secret
metadata:
  name: application-secret
  namespace: vagina-server
  labels:
    app: vagina-server
    component: backend
    name: application-secret
    environment: production
  annotations:
    # This manifest intentionally does not contain secret payloads.
    # Populate the application-secret.yaml key out-of-band from
    # application-secret-template.yaml before or after applying this resource.
    vagina.app/secret-template: application-secret-template.yaml
type: Opaque
