# Kubernetes Production Configuration
# This file is used as a ConfigMap for Kubernetes deployments
# Database connection details use Kubernetes-specific service addresses

# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://pg-cluster-rw.pg-cluster.svc.cluster.local:5432/vagina-server-db

# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# MyBatis Configuration
mybatis.environment.id=quarkus

# OpenAPI Configuration
quarkus.smallrye-openapi.path=/openapi
# Use only YAML format for OpenAPI spec (no JSON generation)
quarkus.smallrye-openapi.info-title=Vagina Server API
quarkus.smallrye-openapi.info-version=0.0.1

# Swagger UI Configuration
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true

# SmallRye Health Configuration
# Health checks exposed at /healthz for external systems (Kubernetes, etc.)
quarkus.smallrye-health.root-path=/healthz

# JWT Configuration
# Production deployments must override these defaults via MP_JWT_VERIFY_PUBLICKEY_LOCATION /
# SMALLRYE_JWT_SIGN_KEY_LOCATION environment variables that point to Kubernetes Secrets.
mp.jwt.verify.publickey.location=${MP_JWT_VERIFY_PUBLICKEY_LOCATION:classpath:dev-keys/publicKey.pem}
mp.jwt.verify.issuer=https://vagina-api.ouchiserver.aokiapp.com
mp.jwt.verify.publickey.algorithm=ES256
smallrye.jwt.sign.key.location=${SMALLRYE_JWT_SIGN_KEY_LOCATION:classpath:dev-keys/privateKey.pem}
smallrye.jwt.new-token.issuer=https://vagina-api.ouchiserver.aokiapp.com

# Vagina authentication configuration
vagina.auth.access-token.lifespan=3600
vagina.auth.refresh-token.lifespan=2592000
vagina.auth.oauth.state.lifespan=600

# Harigata OIDC provider configuration
vagina.auth.oidc.harigata.issuer=${HARIGATA_OIDC_ISSUER:https://localhost:3001}
vagina.auth.oidc.harigata.configuration-url=${HARIGATA_OIDC_DISCOVERY_URL:https://localhost:3001/.well-known/openid-configuration}
vagina.auth.oidc.harigata.client-id=${HARIGATA_OIDC_CLIENT_ID:harigata-client}
vagina.auth.oidc.harigata.client-secret=${HARIGATA_OIDC_CLIENT_SECRET:harigata-secret}
vagina.auth.oidc.harigata.authorization-endpoint=${HARIGATA_OIDC_AUTHORIZE_URL:https://localhost:3001/authorize}
vagina.auth.oidc.harigata.token-endpoint=${HARIGATA_OIDC_TOKEN_URL:https://localhost:3001/token}
vagina.auth.oidc.harigata.userinfo-endpoint=${HARIGATA_OIDC_USERINFO_URL:https://localhost:3001/userinfo}
vagina.auth.oidc.harigata.jwks-url=${HARIGATA_OIDC_JWKS_URL:https://localhost:3001/jwks}

# CORS Configuration
# Use regex pattern to allow all origins while respecting credentials
# Using /..*/ instead of wildcard * to allow Access-Control-Allow-Credentials
# Note: This matches the main application.properties configuration
# Consider restricting to specific domains in production if needed
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=authorization,content-type
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H

# ================================
# Observability Configuration
# ================================

# Logging Configuration - JSON structured logging
# When JSON logging is enabled, the console format is ignored
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
# Include additional fields in logs
quarkus.log.console.json.additional-field."service.name".value=vagina-server
quarkus.log.console.json.additional-field."service.version".value=0.0.1
# Log level configuration
quarkus.log.level=INFO
quarkus.log.category."app.vagina.server".level=INFO

# Metrics Configuration - Micrometer + Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
# Binder configuration - enable various metrics collectors
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.http-client.enabled=true
quarkus.micrometer.binder.vertx.enabled=true

# ================================
# LLM Configuration (Azure OpenAI)
# ================================

# Azure deployment name (model name)
quarkus.langchain4j.azure-openai.chat-model.deployment-name=${AZURE_OPENAI_DEPLOYMENT_NAME:gpt-4}
