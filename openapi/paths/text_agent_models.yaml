paths:
  /text-agents/models:
    get:
      tags:
        - text-agent-models
      operationId: listTextAgentModels
      summary: List text agent model presets
      description: >-
        Lists safe text-agent model preset metadata exposed by the server text
        model registry. Provider, base URL, API key, self-hosted, and hosted
        transport details are intentionally hidden.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Text agent model presets visible to the authenticated user.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - id
                    - displayName
                    - isDefault
                    - isAvailable
                  properties:
                    id:
                      type: string
                      minLength: 1
                      maxLength: 128
                      example: text-agent-prod
                    displayName:
                      type: string
                      minLength: 1
                      maxLength: 128
                      example: text-agent-prod
                    isDefault:
                      type: boolean
                      example: true
                    isAvailable:
                      type: boolean
                      description: >-
                        Whether the authenticated user may select and use this
                        text agent model. Public catalog items can be returned
                        with false so clients can render them as locked.
                      example: true
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Server configuration error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
