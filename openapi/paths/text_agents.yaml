paths:
  /text-agents:
    get:
      tags:
        - text-agents
      operationId: listTextAgents
      summary: List text agents
      description: List the authenticated user's text agent definitions.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Text agents.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
    post:
      tags:
        - text-agents
      operationId: createTextAgent
      summary: Create text agent
      description: >-
        Create one text agent definition owned by the authenticated user. The
        server generates the persistent text agent id. Provider, base URL, API
        key, self-hosted, and hosted transport details are not accepted or
        returned.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/text_agent.yaml#/TextAgentCreateRequest"
      responses:
        "201":
          description: Text agent created.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "400":
          description: Invalid request, including unknown model id.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
  /text-agents/{textAgentId}:
    parameters:
      - name: textAgentId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 128
        description: Text agent identifier.
    get:
      tags:
        - text-agents
      operationId: getTextAgent
      summary: Get text agent
      description: Get one text agent definition owned by the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Text agent.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
    put:
      tags:
        - text-agents
      operationId: updateTextAgent
      summary: Update text agent
      description: >-
        Update one existing text agent definition owned by the authenticated
        user. Missing resources are not created. Provider, base URL, API key,
        self-hosted, and hosted transport details are not accepted or returned.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/text_agent.yaml#/TextAgentUpdateRequest"
      responses:
        "200":
          description: Text agent updated.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "400":
          description: Invalid request, including unknown model id.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
    delete:
      tags:
        - text-agents
      operationId: deleteTextAgent
      summary: Delete text agent
      description: Delete one text agent definition owned by the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Text agent deleted.
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
