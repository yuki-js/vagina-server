paths:
  /text-agents:
    get:
      tags:
        - text-agents
      operationId: listTextAgents
      summary: List text agents
      description: List the authenticated user's text agent definitions.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Text agents.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
    post:
      tags:
        - text-agents
      operationId: createTextAgent
      summary: Create text agent
      description: >-
        Create one text agent definition owned by the authenticated user. The
        server generates the persistent text agent id. Provider, base URL, API
        key, self-hosted, and hosted transport details are not accepted or
        returned.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/text_agent.yaml#/TextAgentWriteRequest"
      responses:
        "201":
          description: Text agent created.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "400":
          description: Invalid request, including unknown model id.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
  /text-agents/{textAgentId}:
    parameters:
      - name: textAgentId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 128
        description: Text agent identifier.
    get:
      tags:
        - text-agents
      operationId: getTextAgent
      summary: Get text agent
      description: Get one text agent definition owned by the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Text agent.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
    put:
      tags:
        - text-agents
      operationId: updateTextAgent
      summary: Update text agent
      description: >-
        Update one existing text agent definition owned by the authenticated
        user. Missing resources are not created. Provider, base URL, API key,
        self-hosted, and hosted transport details are not accepted or returned.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/text_agent.yaml#/TextAgentWriteRequest"
      responses:
        "200":
          description: Text agent updated.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "400":
          description: Invalid request, including unknown model id.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
    delete:
      tags:
        - text-agents
      operationId: deleteTextAgent
      summary: Delete text agent
      description: Delete one text agent definition owned by the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Text agent deleted.
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
  /text-agents/{textAgentId}/query:
    parameters:
      - name: textAgentId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 128
        description: Text agent identifier.
    post:
      tags:
        - text-agents
      operationId: queryTextAgent
      summary: Query text agent
      description: >-
        Execute one non-streaming text-agent step bound to an active voice-agent
        session. The server owns the ephemeral conversation memory for the pair
        `(voiceSessionId, textAgentId)` and does not expose thread resources,
        revision counters, expiry timestamps, or provider-native continuation
        identifiers. The client either submits a new prompt or returns one
        previously requested tool result.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - voiceSessionId
                - requestId
              properties:
                voiceSessionId:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: >-
                    Active hosted voice-agent session identifier. Text-agent
                    memory is scoped to this session and is discarded when the
                    voice session expires or ends.
                  example: vs_0123456789abcdef0123456789abcdef
                requestId:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: Client-generated idempotency and correlation identifier.
                  example: req_0123456789abcdef
                prompt:
                  type: string
                  minLength: 1
                  description: >-
                    New user prompt for this step. Exactly one of `prompt` or
                    `toolResult` must be present. Prompt steps may include
                    `images`; tool-result continuation steps must not include
                    images.
                  example: Summarize what the caller just said.
                images:
                  type: array
                  maxItems: 4
                  description: >-
                    Optional image attachments for this prompt step. Images are
                    first-class multimodal input parts, not text embedded in the
                    prompt. The client resolves semantic refs such as
                    `attach_last_user_image` before calling this API. Each image
                    must be a PNG or JPEG RFC 2397 data URI and 8 MiB or smaller
                    after base64 decoding. Images are accepted only when
                    `prompt` is present and are rejected on `toolResult`
                    continuation steps.
                  items:
                    type: object
                    additionalProperties: false
                    required:
                      - dataUri
                    properties:
                      dataUri:
                        type: string
                        minLength: 1
                        description: RFC 2397 data URI containing a PNG or JPEG image, for example `data:image/png;base64,...`.
                        example: data:image/png;base64,iVBORw0KGgo=
                      detail:
                        type: string
                        enum:
                          - auto
                          - low
                          - high
                        default: auto
                        description: Provider vision detail level.
                      name:
                        type: string
                        maxLength: 255
                        description: Optional user-visible source filename.
                        example: whiteboard.png
                toolSchemas:
                  type: array
                  description: >-
                    Client-supplied schemas for Text Agent client-executable
                    tools. Tool execution is client-side, so these schemas come
                    from the client runtime tool registry, not from Voice Agent
                    `tools.set` or Speed Dial exposed tools. The server filters
                    this list by the persisted Text Agent `enabledTools`
                    overrides and server policy before constructing provider
                    requests.
                  items:
                    type: object
                    additionalProperties: false
                    required:
                      - name
                      - description
                      - parameters
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 128
                        description: Client runtime tool name. Text Agent schemas are supplied by the client because the client executes tools.
                        example: document_read
                      description:
                        type: string
                        description: AI-facing tool description supplied by the client runtime registry.
                        example: Read the content of an active filesystem file by path.
                      parameters:
                        type: object
                        description: JSON Schema object for tool parameters supplied by the client runtime registry.
                        example:
                          type: object
                          properties:
                            path:
                              type: string
                              description: Absolute path of the active file to read.
                          required:
                            - path
                toolResult:
                  type: object
                  additionalProperties: false
                  description: >-
                    Tool result for one previously requested client-executable
                    tool call. Exactly one of `prompt` or `toolResult` must be
                    present.
                  required:
                    - toolCallId
                    - output
                    - isError
                  properties:
                    toolCallId:
                      type: string
                      minLength: 1
                      maxLength: 128
                      description: Server-issued tool call identifier.
                      example: tc_0123456789abcdef
                    output:
                      type: string
                      description: >-
                        JSON string tool output returned by the client runtime.
                        `{"success":false,...}` may appear for compatibility,
                        but failure is defined by `isError`, not by JSON fields
                        inside `output`.
                      example: '{"success":true,"text":"The selected note mentions a renewal clause."}'
                    isError:
                      type: boolean
                      description: Whether the submitted tool output represents a tool execution failure.
      responses:
        "200":
          description: Text agent query result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - completed
                      - requires_tool
                      - failed
                  text:
                    type: string
                    description: Final assistant text when `status` is `completed`.
                    example: The caller said they need the contract renewal terms summarized.
                  toolCalls:
                    type: array
                    description: Client-executable tool calls when `status` is `requires_tool`.
                    items:
                      $ref: "../components/schemas/text_agent.yaml#/TextAgentToolCall"
                  error:
                    type: object
                    description: Failure details when `status` is `failed`.
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        minLength: 1
                        maxLength: 128
                        example: provider_unavailable
                      message:
                        type: string
                        minLength: 1
                        example: Text agent provider is temporarily unavailable.
        "400":
          description: Invalid request, including malformed prompt or tool result payload.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "409":
          description: >-
            Voice session is not active, or the submitted tool result does not
            match the current pending text-agent tool call state.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
