paths:
  /text-agents:
    get:
      tags:
        - text-agents
      operationId: listTextAgents
      summary: List text agents
      description: List the authenticated user's text agent definitions.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Text agents.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
    post:
      tags:
        - text-agents
      operationId: createTextAgent
      summary: Create text agent
      description: >-
        Create one text agent definition owned by the authenticated user. The
        server generates the persistent text agent id. Provider, base URL, API
        key, self-hosted, and hosted transport details are not accepted or
        returned.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/text_agent.yaml#/TextAgentWriteRequest"
      responses:
        "201":
          description: Text agent created.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "400":
          description: Invalid request, including unknown model id.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
  /text-agents/{textAgentId}:
    parameters:
      - name: textAgentId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 128
        description: Text agent identifier.
    get:
      tags:
        - text-agents
      operationId: getTextAgent
      summary: Get text agent
      description: Get one text agent definition owned by the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Text agent.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
    put:
      tags:
        - text-agents
      operationId: updateTextAgent
      summary: Update text agent
      description: >-
        Update one existing text agent definition owned by the authenticated
        user. Missing resources are not created. Provider, base URL, API key,
        self-hosted, and hosted transport details are not accepted or returned.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/text_agent.yaml#/TextAgentWriteRequest"
      responses:
        "200":
          description: Text agent updated.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/text_agent.yaml#/TextAgent"
        "400":
          description: Invalid request, including unknown model id.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
    delete:
      tags:
        - text-agents
      operationId: deleteTextAgent
      summary: Delete text agent
      description: Delete one text agent definition owned by the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Text agent deleted.
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
  /text-agents/{textAgentId}/query:
    parameters:
      - name: textAgentId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 128
        description: Text agent identifier.
    post:
      tags:
        - text-agents
      operationId: queryTextAgent
      summary: Query text agent
      description: >-
        Execute one non-streaming text-agent step bound to an active voice-agent
        session. The server owns the ephemeral conversation memory for the pair
        `(voiceSessionId, textAgentId)` and does not expose thread resources,
        revision counters, expiry timestamps, or provider-native continuation
        identifiers. The client either submits a new prompt or returns one
        previously requested tool result.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - voiceSessionId
                - requestId
                - tools
              properties:
                voiceSessionId:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: >-
                    Active hosted voice-agent session identifier. Text-agent
                    memory is scoped to this session and is discarded when the
                    voice session expires or ends.
                  example: vs_0123456789abcdef0123456789abcdef
                requestId:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: Client-generated idempotency and correlation identifier.
                  example: req_0123456789abcdef
                prompt:
                  type: string
                  minLength: 1
                  description: >-
                    New user prompt for this step. Exactly one of `prompt` or
                    `toolResult` must be present.
                  example: Summarize what the caller just said.
                toolResult:
                  type: object
                  additionalProperties: false
                  description: >-
                    Tool result for one previously requested client-executable
                    tool call. Exactly one of `prompt` or `toolResult` must be
                    present.
                  required:
                    - toolCallId
                    - output
                  properties:
                    toolCallId:
                      type: string
                      minLength: 1
                      maxLength: 128
                      description: Server-issued tool call identifier.
                      example: tc_0123456789abcdef
                    output:
                      type: string
                      description: JSON string tool output returned by the client runtime.
                      example: '{"success":true,"text":"The selected note mentions a renewal clause."}'
                    isError:
                      type: boolean
                      default: false
                      description: Whether the submitted tool output represents a tool execution failure.
                tools:
                  type: array
                  description: >-
                    Client-executable tools available for this step. Each item
                    uses the same minimal runtime shape the current client sends
                    to realtime providers: name, description, and JSON Schema
                    parameters.
                  items:
                    type: object
                    additionalProperties: false
                    required:
                      - name
                      - description
                      - parameters
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 128
                        description: Stable tool key.
                        example: document_read
                      description:
                        type: string
                        minLength: 1
                        maxLength: 2048
                        description: AI-facing English tool description.
                        example: Read selected document text.
                      parameters:
                        type: object
                        additionalProperties: true
                        description: JSON Schema object for tool arguments.
                        example:
                          type: object
                          properties:
                            documentId:
                              type: string
                          required:
                            - documentId
      responses:
        "200":
          description: Text agent query result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - completed
                      - requires_tool
                      - failed
                  text:
                    type: string
                    description: Final assistant text when `status` is `completed`.
                    example: The caller said they need the contract renewal terms summarized.
                  toolCalls:
                    type: array
                    description: Client-executable tool calls when `status` is `requires_tool`.
                    items:
                      $ref: "../components/schemas/text_agent.yaml#/TextAgentToolCall"
                  usage:
                    type: object
                    additionalProperties: false
                    properties:
                      inputTokens:
                        type: integer
                        minimum: 0
                        example: 120
                      outputTokens:
                        type: integer
                        minimum: 0
                        example: 48
                      totalTokens:
                        type: integer
                        minimum: 0
                        example: 168
                  error:
                    type: object
                    additionalProperties: false
                    required:
                      - code
                      - message
                    properties:
                      code:
                        type: string
                        minLength: 1
                        maxLength: 128
                        example: provider_unavailable
                      message:
                        type: string
                        minLength: 1
                        example: Text agent provider is temporarily unavailable.
        "400":
          description: Invalid request, including malformed prompt or tool result payload.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "404":
          description: Text agent not found.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "409":
          description: >-
            Voice session is not active, or the submitted tool result does not
            match the current pending text-agent tool call state.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
        "500":
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/ErrorResponse"
