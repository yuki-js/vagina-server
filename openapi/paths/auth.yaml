paths:
  /auth/guest:
    post:
      tags:
        - auth
      operationId: createGuestSession
      summary: Create guest session
      description: Create an anonymous guest user and issue Vagina server tokens.
      security: []
      responses:
        '200':
          description: Guest session created.
          content:
            application/json:
              schema:
                $ref: '../components/schemas/auth.yaml#/AuthTokenResponse'
        '500':
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '../components/schemas/common.yaml#/ErrorResponse'
  /auth/refresh:
    post:
      tags:
        - auth
      operationId: refreshSession
      summary: Refresh session
      description: Rotate an opaque refresh token and issue a new access token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Session refreshed.
          content:
            application/json:
              schema:
                $ref: '../components/schemas/auth.yaml#/AuthTokenResponse'
        '401':
          description: Invalid refresh token.
          content:
            application/json:
              schema:
                $ref: '../components/schemas/common.yaml#/ErrorResponse'
        '500':
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '../components/schemas/common.yaml#/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - auth
      operationId: logout
      summary: Logout
      description: Revoke an opaque refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  minLength: 1
      responses:
        '204':
          description: Logged out.
        '500':
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '../components/schemas/common.yaml#/ErrorResponse'
  /me:
    get:
      tags:
        - auth
      operationId: getCurrentUser
      summary: Get current user
      description: Retrieve the authenticated user associated with the access token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '../components/schemas/user.yaml#/User'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '../components/schemas/common.yaml#/ErrorResponse'
        '500':
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '../components/schemas/common.yaml#/ErrorResponse'
