openapi: 3.0.3
info:
  title: Vagina Server API
  description: REST API for the Vagina application backend
  version: 0.0.1
servers:
  - url: /api
    description: API base path
paths:
  /auth/oidc/{provider}/start:
    $ref: './paths/auth.yaml#/paths/~1auth~1oidc~1{provider}~1start'
  /auth/oidc/{provider}/exchange:
    $ref: './paths/auth.yaml#/paths/~1auth~1oidc~1{provider}~1exchange'
  /auth/refresh:
    $ref: './paths/auth.yaml#/paths/~1auth~1refresh'
  /auth/logout:
    $ref: './paths/auth.yaml#/paths/~1auth~1logout'
  /me:
    $ref: './paths/auth.yaml#/paths/~1me'
  /speed-dials:
    $ref: './paths/speed_dials.yaml#/paths/~1speed-dials'
  /speed-dials/{speedDialId}:
    $ref: './paths/speed_dials.yaml#/paths/~1speed-dials~1{speedDialId}'
  /sessions:
    $ref: './paths/sessions.yaml#/paths/~1sessions'
  /sessions/{sessionId}:
    $ref: './paths/sessions.yaml#/paths/~1sessions~1{sessionId}'
  /sessions/bulk-delete:
    $ref: './paths/sessions.yaml#/paths/~1sessions~1bulk-delete'
  /vfs/rpc:
    $ref: './paths/vfs.yaml#/paths/~1vfs~1rpc'
  /hosted-realtime/v1/connect:
    $ref: './paths/hosted_realtime.yaml#/paths/~1hosted-realtime~1v1~1connect'
  /voice-agents:
    $ref: './paths/voice_agents.yaml#/paths/~1voice-agents'
  /text-agents:
    $ref: './paths/text_agents.yaml#/paths/~1text-agents'
  /text-agents/{textAgentId}:
    $ref: './paths/text_agents.yaml#/paths/~1text-agents~1{textAgentId}'
  /text-agents/{textAgentId}/threads:
    $ref: './paths/text_agents.yaml#/paths/~1text-agents~1{textAgentId}~1threads'
  /text-agents/{textAgentId}/threads/{threadId}:
    $ref: './paths/text_agents.yaml#/paths/~1text-agents~1{textAgentId}~1threads~1{threadId}'
  /text-agents/{textAgentId}/threads/{threadId}/turns:
    $ref: './paths/text_agents.yaml#/paths/~1text-agents~1{textAgentId}~1threads~1{threadId}~1turns'
  /text-agents/models:
    $ref: './paths/text_agent_models.yaml#/paths/~1text-agents~1models'
components:
  schemas:
    User:
      $ref: './components/schemas/user.yaml#/User'
    AuthTokenResponse:
      $ref: './components/schemas/auth.yaml#/AuthTokenResponse'
    ErrorResponse:
      $ref: './components/schemas/common.yaml#/ErrorResponse'
    SessionThread:
      $ref: './components/schemas/session_thread.yaml#/SessionThread'
    TextAgent:
      $ref: './components/schemas/text_agent.yaml#/TextAgent'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
