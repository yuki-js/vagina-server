openapi: 3.0.3
info:
  title: Vagina Server API
  description: REST API for the Vagina application backend
  version: 0.0.1
servers:
  - url: /api
    description: API base path
paths:
  /hello:
    get:
      tags:
        - hello
      operationId: getHello
      summary: Hello World
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelloResponse'
components:
  schemas:
    HelloResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Hello, World!
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
