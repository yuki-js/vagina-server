JsonRpcVersion:
  type: string
  enum:
    - '2.0'

JsonRpcRequestId:
  type: string
  minLength: 1
  maxLength: 128
  description: Phase 1 accepts string request ids only.
  example: req-1

VfsMethod:
  type: string
  enum:
    - vfs.list
    - vfs.read
    - vfs.write
    - vfs.move
    - vfs.delete

VfsPath:
  type: string
  minLength: 1
  maxLength: 512
  pattern: '^/.*$'
  example: /notes/today.md

VfsFile:
  type: object
  additionalProperties: false
  required:
    - path
    - content
  properties:
    path:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'
    content:
      type: string
      example: "# Today"

VfsListParams:
  type: object
  additionalProperties: false
  required:
    - path
  properties:
    path:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'
    recursive:
      type: boolean
      default: false

VfsReadParams:
  type: object
  additionalProperties: false
  required:
    - path
  properties:
    path:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'

VfsWriteParams:
  type: object
  additionalProperties: false
  required:
    - path
    - content
  properties:
    path:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'
    content:
      type: string
      example: "# Today"

VfsMoveParams:
  type: object
  additionalProperties: false
  required:
    - fromPath
    - toPath
  properties:
    fromPath:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'
    toPath:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'

VfsDeleteParams:
  type: object
  additionalProperties: false
  required:
    - path
  properties:
    path:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'

VfsListResult:
  type: object
  additionalProperties: false
  required:
    - entries
  properties:
    entries:
      type: array
      items:
        type: string
        minLength: 1
      example:
        - notes/
        - scratch.md

VfsReadResult:
  type: object
  additionalProperties: false
  required:
    - file
  properties:
    file:
      $ref: '#/VfsFile'

VfsWriteResult:
  type: object
  additionalProperties: false
  required:
    - file
  properties:
    file:
      $ref: '#/VfsFile'

VfsMoveResult:
  type: object
  additionalProperties: false
  required:
    - fromPath
    - toPath
  properties:
    fromPath:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'
    toPath:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'

VfsDeleteResult:
  type: object
  additionalProperties: false
  required:
    - path
  properties:
    path:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'

VfsRpcParams:
  type: object
  additionalProperties: false
  minProperties: 1
  description: |
    Aggregated JSON-RPC params envelope.
    The server validates field combinations according to `method`.
    - `vfs.list` expects the shape of `VfsListParams`
    - `vfs.read` expects the shape of `VfsReadParams`
    - `vfs.write` expects the shape of `VfsWriteParams`
    - `vfs.move` expects the shape of `VfsMoveParams`
    - `vfs.delete` expects the shape of `VfsDeleteParams`
  properties:
    path:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'
    recursive:
      type: boolean
      default: false
    content:
      type: string
      example: "# Today"
    fromPath:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'
    toPath:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'

VfsRpcResult:
  type: object
  additionalProperties: false
  description: |
    Aggregated JSON-RPC success result envelope.
    The server emits fields according to `method`.
    - `vfs.list` returns the shape of `VfsListResult`
    - `vfs.read` returns the shape of `VfsReadResult`
    - `vfs.write` returns the shape of `VfsWriteResult`
    - `vfs.move` returns the shape of `VfsMoveResult`
    - `vfs.delete` returns the shape of `VfsDeleteResult`
  properties:
    entries:
      type: array
      items:
        type: string
        minLength: 1
    file:
      $ref: '#/VfsFile'
    path:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'
    fromPath:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'
    toPath:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '^/.*$'

VfsRpcError:
  type: object
  additionalProperties: false
  required:
    - code
    - message
  properties:
    code:
      type: integer
      format: int32
      example: -32602
    message:
      type: string
      minLength: 1
      example: Invalid params
    data:
      type: object
      additionalProperties: true

VfsRpcRequest:
  type: object
  additionalProperties: false
  required:
    - jsonrpc
    - id
    - method
    - params
  properties:
    jsonrpc:
      $ref: '#/JsonRpcVersion'
    id:
      type: string
      minLength: 1
      maxLength: 128
    method:
      $ref: '#/VfsMethod'
    params:
      $ref: '#/VfsRpcParams'

VfsRpcResponse:
  type: object
  additionalProperties: false
  required:
    - jsonrpc
    - id
  description: |
    Exactly one of `result` or `error` is expected in a valid response.
  properties:
    jsonrpc:
      $ref: '#/JsonRpcVersion'
    id:
      type: string
      minLength: 1
      maxLength: 128
    result:
      $ref: '#/VfsRpcResult'
    error:
      $ref: '#/VfsRpcError'
