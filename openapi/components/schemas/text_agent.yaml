TextAgent:
  type: object
  additionalProperties: false
  required:
    - id
    - name
    - prompt
    - textModelId
    - enabledTools
  properties:
    id:
      type: string
      minLength: 1
      maxLength: 128
      example: ta_0123456789abcdef0123456789abcdef
    name:
      type: string
      minLength: 1
      maxLength: 128
      example: Research Assistant
    prompt:
      type: string
      minLength: 1
      example: You are a careful research assistant.
    description:
      type: string
      nullable: true
      maxLength: 512
      example: Helps analyze long-form documents
    textModelId:
      type: string
      minLength: 1
      maxLength: 128
      description: Server registry text model preset id selected for this text agent.
      example: text-agent-prod
    enabledTools:
      type: object
      description: |
        Map from tool name to enabled flag. Values must be booleans.
        Provider, base URL, API key, self-hosted, and hosted transport details are
        intentionally absent from this public API schema.
      example:
        document_read: true
        document_patch: false
    createdAt:
      type: string
      format: date-time
      nullable: true

TextAgentWriteRequest:
  type: object
  additionalProperties: false
  required:
    - name
    - prompt
    - textModelId
    - enabledTools
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 128
      example: Research Assistant
    prompt:
      type: string
      minLength: 1
      example: You are a careful research assistant.
    description:
      type: string
      nullable: true
      maxLength: 512
      example: Helps analyze long-form documents
    textModelId:
      type: string
      minLength: 1
      maxLength: 128
      description: Server registry text model preset id selected for this text agent.
      example: text-agent-prod
    enabledTools:
      type: object
      description: |
        Map from tool name to enabled flag. Values must be booleans.
        Provider, base URL, API key, self-hosted, and hosted transport details are
        intentionally absent from this public API schema.
      example:
        document_read: true
        document_patch: false

TextAgentThreadStatus:
  type: string
  enum:
    - active
    - expired
    - cancelled

TextAgentToolCall:
  type: object
  additionalProperties: false
  required:
    - id
    - name
    - arguments
  properties:
    id:
      type: string
      minLength: 1
      maxLength: 128
      description: Server-generated tool call identifier to use when submitting a tool result.
      example: tc_0123456789abcdef
    name:
      type: string
      minLength: 1
      maxLength: 128
      description: Client-executable tool name from the normalized tool definitions.
      example: document_read
    arguments:
      type: object
      additionalProperties: true
      description: Normalized JSON object arguments for the client-executable tool.
      example:
        documentId: doc_0123456789abcdef
