SpeedDial:
  type: object
  additionalProperties: false
  required:
    - id
    - name
    - systemPrompt
    - voice
    - voiceAgentId
    - enabledTools
    - toolChoiceRequired
  properties:
    id:
      type: string
      minLength: 1
      maxLength: 128
      example: sd_0123456789abcdef0123456789abcdef
    name:
      type: string
      minLength: 1
      maxLength: 128
      example: Default
    systemPrompt:
      type: string
      minLength: 1
      example: You are a helpful AI assistant.
    description:
      type: string
      nullable: true
      maxLength: 512
      example: Default voice assistant
    iconEmoji:
      type: string
      nullable: true
      minLength: 1
      maxLength: 16
      example: "🤖"
    voice:
      type: string
      minLength: 1
      maxLength: 64
      example: alloy
    voiceAgentId:
      type: string
      minLength: 1
      maxLength: 128
      description: Server registry voice-agent id selected for this speed dial.
      example: voice-agent-prod
    toolChoiceRequired:
      type: boolean
      default: false
      example: false
    enabledTools:
      type: object
      description: |
        Map from tool name to enabled flag. Values must be booleans.
        Intentionally omit typed additionalProperties here because florval 0.3.12
        otherwise generates a runtime-unsafe Dart cast from decoded JSON to
        `Map<String, bool>`.
      example:
        document_read: true
        document_patch: false
    createdAt:
      type: string
      format: date-time
      nullable: true

