SpeedDial:
  type: object
  additionalProperties: false
  required:
    - id
    - name
    - systemPrompt
    - voice
    - enabledTools
  properties:
    id:
      type: string
      minLength: 1
      maxLength: 128
      example: default
    name:
      type: string
      minLength: 1
      maxLength: 128
      example: Default
    systemPrompt:
      type: string
      minLength: 1
      example: You are a helpful AI assistant.
    description:
      type: string
      nullable: true
      maxLength: 512
      example: Default voice assistant
    iconEmoji:
      type: string
      nullable: true
      minLength: 1
      maxLength: 16
      example: "🤖"
    voice:
      type: string
      minLength: 1
      maxLength: 64
      example: alloy
    enabledTools:
      type: object
      additionalProperties:
        type: boolean
      example:
        document_read: true
        document_patch: false
    createdAt:
      type: string
      format: date-time
      nullable: true
