AuthTokenResponse:
  type: object
  required:
    - accessToken
    - refreshToken
    - tokenType
    - expiresIn
    - user
  properties:
    accessToken:
      type: string
    refreshToken:
      type: string
    tokenType:
      type: string
      example: Bearer
    expiresIn:
      type: integer
      format: int64
      example: 3600
    user:
      $ref: './user.yaml#/User'
