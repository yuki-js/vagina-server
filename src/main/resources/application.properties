# Production Configuration
# For development mode, see application-dev.properties which enables Dev Services
# and automatic PostgreSQL container management

# Please don't forget to modify manifests/application.properties as well, since this software is deployed on Kubernetes

# Database Configuration
quarkus.datasource.db-kind=postgresql
# Credentials/URL must be provided via environment variables (prod profile) or Dev Services.
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:}
%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:}

# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# MyBatis Configuration
mybatis.environment.id=quarkus

# OpenAPI Configuration
quarkus.smallrye-openapi.path=/openapi
# Use only YAML format for OpenAPI spec (no JSON generation)
quarkus.smallrye-openapi.info-title=Vagina Server API
quarkus.smallrye-openapi.info-version=0.0.1

# Swagger UI Configuration
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true

# SmallRye Health Configuration
# Health checks exposed at /healthz for external systems (Kubernetes, etc.)
quarkus.smallrye-health.root-path=/healthz

# JWT Configuration
# Production deployments must override these defaults via MP_JWT_VERIFY_PUBLICKEY_LOCATION /
# SMALLRYE_JWT_SIGN_KEY_LOCATION environment variables that point to Kubernetes Secrets.
mp.jwt.verify.publickey.location=${MP_JWT_VERIFY_PUBLICKEY_LOCATION:classpath:dev-keys/publicKey.pem}
mp.jwt.verify.issuer=https://vagina-api.ouchiserver.aokiapp.com
mp.jwt.verify.publickey.algorithm=ES256
smallrye.jwt.sign.key.location=${SMALLRYE_JWT_SIGN_KEY_LOCATION:classpath:dev-keys/privateKey.pem}
smallrye.jwt.new-token.issuer=https://vagina-api.ouchiserver.aokiapp.com

# Vagina authentication configuration
vagina.auth.access-token.lifespan=3600
vagina.auth.refresh-token.lifespan=2592000
vagina.auth.oauth.state.lifespan=600
vagina.auth.oauth.pkce.secret=${VAGINA_AUTH_OIDC_PKCE_SECRET:}
vagina.auth.oidc.redirect-uri.web=https://example.com/callback
vagina.auth.oidc.redirect-uri.mobile=https://example.com/callback
vagina.auth.oidc.redirect-uri.desktop=https://example.com/callback

# Harigata OIDC provider configuration
vagina.auth.oidc.harigata.issuer=${HARIGATA_OIDC_ISSUER:http://localhost:18080}
vagina.auth.oidc.harigata.configuration-url=${HARIGATA_OIDC_DISCOVERY_URL:http://localhost:18080/.well-known/openid-configuration}
vagina.auth.oidc.harigata.client-id=${HARIGATA_OIDC_CLIENT_ID:harigata-client-id}
vagina.auth.oidc.harigata.client-secret=${HARIGATA_OIDC_CLIENT_SECRET:harigata-client-secret}
vagina.auth.oidc.harigata.authorization-endpoint=${HARIGATA_OIDC_AUTHORIZE_URL:http://localhost:18080/authorize}
vagina.auth.oidc.harigata.token-endpoint=${HARIGATA_OIDC_TOKEN_URL:http://localhost:18080/token}
vagina.auth.oidc.harigata.userinfo-endpoint=${HARIGATA_OIDC_USERINFO_URL:http://localhost:18080/userinfo}
vagina.auth.oidc.harigata.jwks-url=${HARIGATA_OIDC_JWKS_URL:http://localhost:18080/jwks}

# GitHub OAuth provider configuration
# (no defaults in application.properties; use environment variables at runtime)

# CORS Configuration
# Use regex pattern to allow all origins while respecting credentials
# Using /..*/ instead of wildcard * to allow Access-Control-Allow-Credentials
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=authorization,content-type
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H

# ================================
# Observability Configuration
# ================================

# Logging Configuration - JSON structured logging
# When JSON logging is enabled, the console format is ignored
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
# Include additional fields in logs
quarkus.log.console.json.additional-field."service.name".value=vagina-server
quarkus.log.console.json.additional-field."service.version".value=0.0.1
# Log level configuration
quarkus.log.level=INFO
quarkus.log.category."app.vagina.server".level=INFO

# ================================
# Hosted Realtime (VHRP/1) Configuration
# ================================

# WebSocket frame/message size limits for the hosted-realtime endpoint.
# The default max-frame-size is 65536 (64 KiB), which is too small for PTT audio turns
# (24 kHz / mono / 16-bit PCM: 64 KiB ≈ 1.36 s) and for image payloads.
# Raised to 1 MiB = 1,048,576 bytes ≈ 21.8 s of 24 kHz mono 16-bit PCM.
# max-message-size is also set explicitly to 1 MiB to match; without this the
# Quarkus default would be max-frame-size × 4 = 4 MiB, which is unnecessarily large.
# Keys confirmed from io.quarkus.websockets.next.runtime.config.WebSocketsServerRuntimeConfig
# in quarkus-websockets-next-3.28.5-sources.jar (prefix = "quarkus.websockets-next.server").
quarkus.websockets-next.server.max-frame-size=1048576
quarkus.websockets-next.server.max-message-size=1048576

# modelId -> driver registry (judgment 7). The client sends only a modelId in session.open; this
# mapping is the single server-side place that decides which vendor backs it and how to reach it.
vagina.realtime.default-model=voice-agent-prod
vagina.realtime.models.voice-agent-prod.provider=oai
vagina.realtime.models.voice-agent-prod.base-url=${OAI_REALTIME_BASE_URL:}
vagina.realtime.models.voice-agent-prod.api-key=${OAI_REALTIME_API_KEY:}
vagina.realtime.models.voice-agent-prod.transcription-model=${OAI_REALTIME_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}

vagina.realtime.models.voice-agent-prod-cc.provider=oai_cc
vagina.realtime.models.voice-agent-prod-cc.base-url=${OAI_CC_BASE_URL:}
vagina.realtime.models.voice-agent-prod-cc.api-key=${OAI_CC_API_KEY:}

# Text-agent model/preset registry. Clients receive only ids/display names; provider and
# downstream connection details stay server-side for future hosted text execution.
vagina.text-agent.default-model=text-agent-prod
vagina.text-agent.models.text-agent-prod.provider=oai_chat
vagina.text-agent.models.text-agent-prod.display-name=text-agent-prod
vagina.text-agent.models.text-agent-prod.base-url=${OAI_TEXT_BASE_URL:}
vagina.text-agent.models.text-agent-prod.api-key=${OAI_TEXT_API_KEY:}
vagina.text-agent.models.text-agent-prod.model=${OAI_TEXT_MODEL:gpt-4o-mini}

vagina.text-agent.models.aok.provider=oai_chat
vagina.text-agent.models.aok.display-name=Aok (Hermes Agent)
vagina.text-agent.models.aok.base-url=http://10.1.0.10:8642/v1
vagina.text-agent.models.aok.api-key=${OAI_AOK_API_KEY:}

# Metrics Configuration - Micrometer + Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
# Binder configuration - enable various metrics collectors
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.http-client.enabled=true
quarkus.micrometer.binder.vertx.enabled=true
