# Test-only configuration overrides.
#
# These values exist to satisfy required config mappings during `./gradlew test`
# without depending on development-only `application-dev.yaml` or production
# manifests. They are placeholders only; real OpenAI sequence tests remain opt-in
# and still require explicit credentials/config passed from the caller.

quarkus:
  http:
    test-port: 0
    test-ssl-port: 0
  wiremock:
    devservices:
      enabled: true
      reload: false
      files-mapping: wiremock/test
      global-response-templating: true
  websockets-next:
    server:
      supported-subprotocols:
        - vhrp.cbor.v1
  flyway:
    clean-at-start: true
    clean-disabled: false
mp:
  jwt:
    verify:
      publickey:
        location: classpath:dev-keys/publicKey.pem
        algorithm: ES256
      issuer: http://localhost:8081

smallrye:
  jwt:
    sign:
      key:
        location: classpath:dev-keys/privateKey.pem
    new-token:
      issuer: http://localhost:8081

vagina:
  test:
    oai-cc:
      base-url: http://localhost:${quarkus.wiremock.devservices.port}/v1

  auth:
    oidc:
      providers:
        harigata:
          display-name: Harigata
          issuer: http://localhost:${quarkus.wiremock.devservices.port}
          configuration-url: http://localhost:${quarkus.wiremock.devservices.port}/.well-known/openid-configuration
          client-id: harigata-client-id
          client-secret: harigata-client-secret
          authorization-endpoint: http://localhost:${quarkus.wiremock.devservices.port}/authorize
          token-endpoint: http://localhost:${quarkus.wiremock.devservices.port}/token
          userinfo-endpoint: http://localhost:${quarkus.wiremock.devservices.port}/userinfo
          jwks-url: http://localhost:${quarkus.wiremock.devservices.port}/jwks
      redirect-uri:
        web: https://example.test/callback
        mobile: https://example.test/callback
        desktop: https://example.test/callback

  realtime:
    default-model: voice-agent-prod
    models:
      voice-agent-prod:
        provider: oai_cc
        display-name: voice-agent-prod
        base-url: ${vagina.test.oai-cc.base-url}
        api-key: test-oai-cc-api-key
        model: test-oai-cc-model
      voice-agent-prod-cc:
        provider: oai_cc
        display-name: Test Voice Agent CC
        base-url: ${vagina.test.oai-cc.base-url}
        api-key: test-oai-cc-api-key
        model: test-oai-cc-model
      # Opt-in real-provider tests only. Non-routable defaults keep normal CI configuration valid and
      # hermetic; the real test rejects these sentinels unless explicit credentials are supplied.
      voice-agent-prod-realtime:
        provider: oai
        display-name: Test Voice Agent Realtime
        base-url: ${OAI_REALTIME_BASE_URL:https://realtime.invalid/openai/v1}
        api-key: ${OAI_REALTIME_API_KEY:__NO_AUTH__}
        model: ${OAI_REALTIME_MODEL:gpt-realtime-2}
        transcription-model: ${OAI_REALTIME_TRANSCRIPTION_MODEL:gpt-4o-transcribe}
      test-voice-agent-entitled:
        provider: oai_cc
        display-name: test-voice-agent-entitled
        base-url: ${vagina.test.oai-cc.base-url}
        api-key: test-oai-cc-api-key
        model: test-oai-cc-model
        required-entitlement: premium.voice
        is-stealth: true
      test-voice-agent-public-entitled:
        provider: oai_cc
        display-name: Test Locked Voice Agent
        base-url: ${vagina.test.oai-cc.base-url}
        api-key: test-oai-cc-api-key
        model: test-oai-cc-model
        required-entitlement: premium.voice.public
      test-voice-agent-fail-connect:
        provider: oai
        display-name: Test Voice Agent Fail Connect
        base-url: ${vagina.test.oai-cc.base-url}
        api-key: test-oai-realtime-api-key
        model: test-oai-realtime-model
        transcription-model: test-transcription-model

  text-agent:
    default-model: text-agent-prod
    models:
      text-agent-prod:
        provider: oai_chat
        display-name: text-agent-prod
        base-url: https://text-agent.invalid/v1
        api-key: __NO_AUTH__
        model: gpt-5.5
      test-text-agent-wiremock:
        provider: oai_chat
        display-name: Test Text Agent WireMock
        base-url: http://localhost:${quarkus.wiremock.devservices.port}/v1
        api-key: test-text-agent-api-key
        model: gpt-5.5
        is-stealth: true
      test-text-agent-entitled:
        provider: oai_chat
        display-name: test-text-agent-entitled
        base-url: https://text-agent.invalid/v1
        api-key: __NO_AUTH__
        model: gpt-5.5
        required-entitlement: premium.text
        is-stealth: true
      test-text-agent-public-entitled:
        provider: oai_chat
        display-name: Test Locked Text Agent
        base-url: https://text-agent.invalid/v1
        api-key: __NO_AUTH__
        model: gpt-5.5
        required-entitlement: premium.text.public

  object-storage:
    endpoint: https://object-storage.invalid
    bucket: test-placeholder-bucket
    region: us-east-1
    access-key: test-placeholder-access-key
    secret-key: test-placeholder-secret-key
    path-prefix: test
