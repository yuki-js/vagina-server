name: Dev UI Test

on:
  push:
    branches:
      - main

jobs:
  dev-ui-startup:
    name: Verify Dev UI Starts with Dev Services
    runs-on: ubuntu-latest
    env:
      # CI only: this startup check does not call external providers or object storage,
      # but Quarkus validates every configured development model during startup.
      OAI_COMMON_API_KEY: ci-dev-ui-placeholder-oai-key
      AOK_API_KEY: ci-dev-ui-placeholder-aok-key
      VAGINA_OBJECT_STORAGE_ENDPOINT: https://object-storage.invalid
      VAGINA_OBJECT_STORAGE_BUCKET: ci-dev-ui-placeholder
      VAGINA_OBJECT_STORAGE_REGION: us-east-1
      VAGINA_OBJECT_STORAGE_ACCESS_KEY: ci-dev-ui-placeholder-access
      VAGINA_OBJECT_STORAGE_SECRET_KEY: ci-dev-ui-placeholder-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Pre-build to avoid delays during dev mode
        run: |
          echo "Pre-compiling the application..."
          ./gradlew assemble

      - name: Start Quarkus in dev mode
        id: start-quarkus
        run: |
          echo "Starting Quarkus in dev mode..."
          ./gradlew quarkusDev > quarkus-dev.log 2>&1 &
          QUARKUS_PID=$!
          echo "Quarkus PID: $QUARKUS_PID"
          echo "$QUARKUS_PID" > quarkus.pid

          # Wait for Quarkus to start (max 2 minutes)
          echo "Waiting for Quarkus to start..."
          for i in {1..60}; do
            if curl --fail --silent --show-error http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Quarkus started successfully!"
              break
            fi
            if ! kill -0 $QUARKUS_PID 2>/dev/null; then
              echo "Quarkus process died unexpectedly!"
              cat quarkus-dev.log
              exit 1
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done

          if ! curl --fail --silent --show-error http://localhost:8080/healthz > /dev/null 2>&1; then
            echo "Quarkus failed to start within 2 minutes"
            cat quarkus-dev.log
            kill $QUARKUS_PID || true
            exit 1
          fi

      - name: Verify Dev UI is accessible
        id: verify-dev-ui
        run: |
          echo "Verifying Dev UI is accessible..."

          # Check health endpoint
          if curl --fail --silent --show-error http://localhost:8080/healthz; then
            echo "✅ Health endpoint is accessible"
          else
            echo "❌ Health endpoint is not accessible"
            exit 1
          fi

          # Check Dev UI
          if curl --fail --silent --show-error --location http://localhost:8080/q/dev-ui > /dev/null; then
            echo "✅ Dev UI is accessible"
          else
            echo "❌ Dev UI is not accessible"
            exit 1
          fi

          # Check if Dev Services (PostgreSQL) is running
          if curl -s -L http://localhost:8080/q/dev-ui | grep -q "postgresql"; then
            echo "✅ Dev Services (PostgreSQL) is running"
          else
            echo "⚠️  Dev Services (PostgreSQL) may not be running"
          fi

      - name: Test live reload
        id: test-live-reload
        run: |
          echo "Testing live reload..."

          # Get initial response
          INITIAL_RESPONSE=$(curl -s http://localhost:8080/healthz)
          echo "Initial response: $INITIAL_RESPONSE"

          # Modify a source file to trigger reload
          TARGET_FILE=$(find src/main/java -name '*ApiImpl.java' | head -n 1)
          if [ -z "$TARGET_FILE" ]; then
            TARGET_FILE=$(find src/main/java -name '*.java' | head -n 1)
          fi

          if [ -z "$TARGET_FILE" ]; then
            echo "❌ Could not find a Java source file for live reload test"
            exit 1
          fi

          echo "// Test comment for live reload $(date +%s)" >> "$TARGET_FILE"

          # Wait for reload
          sleep 10

          # Get new response
          NEW_RESPONSE=$(curl -s http://localhost:8080/healthz)
          echo "New response: $NEW_RESPONSE"

          echo "✅ Live reload test completed"

      - name: Cleanup
        if: always()
        run: |
          if [ -f quarkus.pid ]; then
            QUARKUS_PID=$(cat quarkus.pid)
            if kill -0 $QUARKUS_PID 2>/dev/null; then
              echo "Stopping Quarkus (PID: $QUARKUS_PID)..."
              kill $QUARKUS_PID || true
              sleep 2
              kill -9 $QUARKUS_PID 2>/dev/null || true
            fi
          fi

          # Show logs if test failed
          if [ -f quarkus-dev.log ]; then
            echo "Quarkus Dev Mode Logs:"
            cat quarkus-dev.log
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "# 🧑‍💻 Dev UI Test Summary"
            echo ""
            echo "## Step outcomes"
            echo ""
            echo "- Quarkus startup: ${{ steps.start-quarkus.outcome }}"
            echo "- Health and Dev UI verification: ${{ steps.verify-dev-ui.outcome }}"
            echo "- Live reload: ${{ steps.test-live-reload.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
